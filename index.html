<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBite</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🍔 QuickBite</h1>
  <input id="search" placeholder="Search food...">
</header>

<nav>
  <button onclick="showAll()">All</button>
  <button onclick="filterCat('Burger')">Burger</button>
  <button onclick="filterCat('Pizza')">Pizza</button>
  <button onclick="openCart()">Cart 🛒 (<span id="cartCount">0</span>)</button>
</nav>

<section class="grid" id="foodList"></section>

<!-- FOOD MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box">
    <span onclick="closeModal()" class="close">&times;</span>
    <div id="modalBody"></div>
  </div>
</div>

<!-- CART MODAL -->
<div id="cartModal" class="modal hidden">
  <div class="modal-box">
    <span onclick="closeCart()" class="close">&times;</span>
    <h2>Your Cart</h2>
    <div id="cartItems"></div>
    <h3 id="total"></h3>
    <button onclick="checkout()">Checkout</button>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkoutModal" class="modal hidden">
  <div class="modal-box">
    <h2>Order Placed 🎉</h2>
    <p>Preparing your food...</p>
    <p id="trackStatus">Status: Cooking 🍳</p>
    <button onclick="closeCheckout()">Done</button>
  </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
